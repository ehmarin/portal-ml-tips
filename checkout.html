{% extends "base.html" %}

{% block content %}
<h1 style="text-align: center; color: var(--color-principal);">Completar Compra</h1>

<div class="checkout-form">
    <p style="text-align: center; margin-bottom: 2rem;">Por favor, ingresa tus datos para procesar el pedido.</p>
    
    <form action="{{ url_for('main.checkout') }}" method="POST">
        <div class="form-group">
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" name="nombre" required placeholder="Ej: María Pérez">
        </div>
        
        <div class="form-group">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required placeholder="maria@ejemplo.com">
        </div>
        
        <div class="form-group">
            <label for="direccion">Dirección de Envío:</label>
            <input type="text" id="direccion" name="direccion" required placeholder="Av. Principal 123">
        </div>
        
        <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 1rem; font-size: 1.1rem;">Confirmar y Pagar</button>
    </form>
</div>
{% endblock %}
